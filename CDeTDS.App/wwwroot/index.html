<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CDeTDS</title>
    <base href="/" />
    <style>
        /* Roboto subset — inline so no internet required on first load */
        body { font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="css/app.css?v=13" rel="stylesheet" />
</head>
<body>
    <div id="app">Loading...</div>
    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script>
        // Start Blazor with auto-reconnect so "socket closed unexpectedly" recovers gracefully
        Blazor.start({
            reconnectionOptions: {
                maxRetries: 10,
                retryIntervalMilliseconds: 2000
            },
            reconnectionHandler: {
                onConnectionDown: function (options, error) {
                    console.warn('[CDeTDS] Blazor connection lost. Reconnecting...', error);
                    var el = document.getElementById('blazor-reconnect-banner');
                    if (!el) {
                        el = document.createElement('div');
                        el.id = 'blazor-reconnect-banner';
                        el.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#e53935;color:white;text-align:center;padding:8px;font-weight:600;z-index:99999;font-size:14px';
                        el.textContent = 'Reconnecting to CDeTDS...';
                        document.body.appendChild(el);
                    }
                },
                onConnectionUp: function () {
                    console.info('[CDeTDS] Blazor connection restored.');
                    var el = document.getElementById('blazor-reconnect-banner');
                    if (el) el.remove();
                },
                onMaxRetryCountExceeded: function () {
                    var el = document.getElementById('blazor-reconnect-banner');
                    if (el) {
                        el.style.background = '#b71c1c';
                        el.innerHTML = 'CDeTDS connection lost. <a href="/" style="color:white;text-decoration:underline">Click here to reload</a>.';
                    }
                }
            }
        });
    </script>
    <script>
        window.cdetds = {
            copyToClipboard: function (text) {
                // navigator.clipboard is blocked in WebView2 without permissions policy.
                // Use execCommand fallback which works reliably in WebView2.
                try {
                    var ta = document.createElement('textarea');
                    ta.value = text;
                    ta.style.position = 'fixed';
                    ta.style.opacity = '0';
                    document.body.appendChild(ta);
                    ta.focus();
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    return true;
                } catch (e) { return false; }
            },
            scrollToTop: function () {
                var el = document.querySelector('.mud-main-content');
                if (el) el.scrollTop = 0;
            },
            printElement: function (elementId) {
                var el = document.getElementById(elementId);
                if (!el) return;
                var w = window.open('', '_blank');
                w.document.write('<html><head><title>Print</title>');
                w.document.write('<link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet"/>');
                w.document.write('<link href="css/print.css" rel="stylesheet"/>');
                w.document.write('</head><body>');
                w.document.write(el.innerHTML);
                w.document.write('</body></html>');
                w.document.close();
                w.focus();
                w.print();
                w.close();
            },
            setBodyClass: function (cls, add) {
                if (add) document.body.classList.add(cls);
                else document.body.classList.remove(cls);
            },
            getPayrollTop: function () {
                // Returns [top, left] so the fixed table wrapper sits exactly below the KPI/header
                // and to the right of the sidebar.
                var kpi = document.getElementById('payroll-kpi');
                var top = kpi ? kpi.getBoundingClientRect().bottom + 4
                              : (function(){
                                    var hdr = document.querySelector('.reports-sticky-hdr');
                                    return hdr ? hdr.getBoundingClientRect().bottom + 4 : 184;
                                })();
                var mc = document.querySelector('.mud-main-content');
                var left = mc ? mc.getBoundingClientRect().left : 256;
                return { top: top, left: left };
            }
        };

        // Date mask: user types digits only → auto-inserts dashes → dd-MM-yyyy
        function applyDateMask(input) {
            if (input.dataset.dateMasked) return;
            // Never mask inputs that are select/combobox/autocomplete controls
            if (input.getAttribute('role') === 'combobox') return;
            if (input.getAttribute('aria-haspopup') === 'listbox') return;
            if (input.closest('[role="combobox"]')) return;
            if (input.readOnly) return;
            input.dataset.dateMasked = '1';
            input.setAttribute('inputmode', 'numeric');
            input.setAttribute('maxlength', '10');

            input.addEventListener('keydown', function (e) {
                if (e.ctrlKey || e.metaKey) return;
                if (['Backspace','Delete','Tab','ArrowLeft','ArrowRight','Home','End'].indexOf(e.key) >= 0) return;
                if (!/^\d$/.test(e.key)) { e.preventDefault(); }
            });

            input.addEventListener('input', function () {
                var pos = input.selectionStart;
                var raw = input.value.replace(/\D/g, '').slice(0, 8);
                var out = raw;
                if (raw.length > 4)      out = raw.slice(0,2) + '-' + raw.slice(2,4) + '-' + raw.slice(4);
                else if (raw.length > 2) out = raw.slice(0,2) + '-' + raw.slice(2);

                input.value = out;

                // Fire change when 8 digits entered (full date) so Blazor @bind / @onchange picks up
                if (raw.length === 8) {
                    input.dispatchEvent(new Event('change', { bubbles: true }));
                }
            });

            // On blur: validate and fire change if not already dispatched
            input.addEventListener('blur', function () {
                var raw = input.value.replace(/\D/g, '');
                if (raw.length === 8) {
                    input.dispatchEvent(new Event('change', { bubbles: true }));
                }
            });
        }

        function initDateFields(root) {
            root.querySelectorAll('.date-field input[type=text]').forEach(function(input) {
                // Only mask if it's actually a date picker input (has a MudDatePicker ancestor)
                if (input.closest('.mud-picker') || input.closest('.date-field')) {
                    applyDateMask(input);
                }
            });
        }

        // Amount field mask: show 0.00 placeholder, clear on focus, reformat on blur
        function applyAmountMask(input) {
            if (input.dataset.amountMasked) return;
            input.dataset.amountMasked = '1';
            input.setAttribute('placeholder', '0.00');
            input.setAttribute('inputmode', 'decimal');

            // On focus: select all so user can just start typing
            input.addEventListener('focus', function () {
                setTimeout(function () { input.select(); }, 10);
            });

            // Allow only digits, one dot, backspace, delete, arrows
            input.addEventListener('keydown', function (e) {
                if (e.ctrlKey || e.metaKey) return;
                if (['Backspace','Delete','Tab','ArrowLeft','ArrowRight','Home','End'].indexOf(e.key) >= 0) return;
                if (!/^\d$/.test(e.key) && e.key !== '.') { e.preventDefault(); return; }
                // Only one dot allowed
                if (e.key === '.' && input.value.includes('.')) e.preventDefault();
            });

            // On blur: reformat to 2 decimal places and fire change for Blazor
            input.addEventListener('blur', function () {
                var v = parseFloat(input.value);
                if (!isNaN(v)) {
                    input.value = v.toFixed(2);
                    input.dispatchEvent(new Event('change', { bubbles: true }));
                } else if (input.value === '' || input.value === '0') {
                    input.value = '0.00';
                    input.dispatchEvent(new Event('change', { bubbles: true }));
                }
            });
        }

        function initAmountFields(root) {
            root.querySelectorAll('.amount-field input[type=text], .amount-field input:not([type])').forEach(applyAmountMask);
        }

        // TAN/PAN uppercase: force input value to uppercase on every keystroke
        function applyUppercase(input) {
            if (input.dataset.upperApplied) return;
            input.dataset.upperApplied = '1';
            input.addEventListener('input', function () {
                var pos = input.selectionStart;
                input.value = input.value.toUpperCase();
                input.setSelectionRange(pos, pos);
            });
        }

        function initUppercaseFields(root) {
            root.querySelectorAll('.tan-field input, .pan-field input, .upper-field input').forEach(applyUppercase);
        }

        // Number inputs: select-all on focus so typing replaces the 0 immediately
        // Use document-level delegation so it works even after Blazor re-renders
        document.addEventListener('focus', function (e) {
            if (e.target && e.target.type === 'number') {
                setTimeout(function () { e.target.select(); }, 0);
            }
        }, true);

        function applyNumberFocus(input) { /* kept for compat, delegation handles it */ }
        function initNumberFields(root) { /* kept for compat, delegation handles it */ }

        document.addEventListener('DOMContentLoaded', function () {
            initDateFields(document);
            initUppercaseFields(document);
            initAmountFields(document);
            initNumberFields(document);
            new MutationObserver(function(mutations) {
                mutations.forEach(function(m) {
                    m.addedNodes.forEach(function(node) {
                        if (node.nodeType !== 1) return;
                        initDateFields(node);
                        initUppercaseFields(node);
                        initAmountFields(node);
                        initNumberFields(node);
                    });
                });
            }).observe(document.body, { childList: true, subtree: true });
        });
    </script>
</body>
</html>
